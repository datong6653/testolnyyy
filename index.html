<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A型肝炎疫調表單 - 匯出模組整合版</title>
  <style>
    /* 基礎樣式 */
    body{font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans TC, "Microsoft JhengHei", Arial, sans-serif; margin:0; background:#f7f7f8; color:#222}
    header{background:#0054a6; color:#fff; padding:24px}
    header h1{margin:0; font-size:22px}
    main{max-width:1100px; margin:24px auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,.08)}
    section{margin:24px 0}
    section h2{font-size:18px; margin:0 0 12px; color:#00487c; border-left: 4px solid #0054a6; padding-left: 10px;}
    .grid{display:grid; grid-template-columns: repeat(12, 1fr); gap:12px}
    .card{border:1px solid #e5e7eb; border-radius:12px; padding:16px; margin-bottom: 20px;}
    label{display:block; margin:6px 0;}
    input[type=text], input[type=date], input[type=tel], input[type=number], select, textarea{width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; box-sizing: border-box;}
    .muted{color:#666; font-size:12px; line-height: 1.5}
    .btn{background:#0054a6; color:#fff; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight: bold; transition: 0.2s;}
    .btn:hover{opacity: 0.9;}
    .btn.secondary{background:#6b7280}
    table{width:100%; border-collapse:collapse; margin:10px 0; font-size: 14px;}
    th, td{border:1px solid #e5e7eb; padding:8px; text-align:left;}
    th{background:#f1f5f9; white-space: nowrap;}
    .tag{display:inline-block; background:#eef2ff; color:#3730a3; padding:2px 10px; border-radius:999px; font-size:13px; font-weight:bold; margin-bottom: 8px;}
    .req::after{content:"（必填）"; color:#b91c1c; margin-left:6px; font-size:12px}
    .table-responsive { overflow-x: auto; }

    /* --- 列印專用樣式 --- */
    @media print {
      body { background: #fff; }
      header, .btn, .secondary, .muted, .no-print { display: none !important; }
      main { margin: 0; padding: 0; box-shadow: none; max-width: 100%; }
      .card { border: 1px solid #eee; page-break-inside: avoid; margin-bottom: 10px; }
      input, select, textarea { border: none !important; background: transparent !important; padding: 0 !important; appearance: none; -webkit-appearance: none; }
      .grid { display: block; }
      section h2 { border-left: 6px solid #0054a6; }
    }
  </style>
</head>
<body>

<header>
  <h1>傳染病問卷調查管理系統｜病毒性 A 型肝炎疫調線上表單</h1>
</header>

<main id="capture-area">
  <section class="card" style="background: #fff9e6; border: 2px solid #ffe58f;">
    <h2>核心日期計算（自動推算）</h2>
    <div class="grid">
      <div style="grid-column: span 12;">
        <label class="req"><strong>發病日期 (Date of Onset)：</strong>
          <input type="date" id="primary_onset_date" onchange="calculateEpidemicPeriods()" required>
        </label>
      </div>
      <div style="grid-column: span 6; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb;">
        <strong style="color: #d46b08;">🔍 潛伏期調查區間 (-15~-50天)</strong><br>
        <span id="latent_range_display" style="font-weight: bold; color: #b91c1c; font-size: 18px;">請選擇發病日</span>
      </div>
      <div style="grid-column: span 6; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb;">
        <strong style="color: #d46b08;">📢 可傳染期調查區間 (-14~+7天)</strong><br>
        <span id="infectious_range_display" style="font-weight: bold; color: #b91c1c; font-size: 18px;">請選擇發病日</span>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>主要飲水來源</h2>
    <div class="grid">
      <div style="grid-column: span 6;">
        <h3 class="tag">住家</h3>
        <label><input type="checkbox" name="home_water" value="自來水"> 自來水</label>
        <label><input type="checkbox" name="home_water" value="包裝水"> 包裝水</label>
        <label>是否煮沸？ <select name="home_boiled"><option value="">請選擇</option><option>是</option><option>否</option></select></label>
      </div>
      <div style="grid-column: span 6;">
        <h3 class="tag">工作地點</h3>
        <label><input type="checkbox" name="work_water" value="自來水"> 自來水</label>
        <label><input type="checkbox" name="work_water" value="包裝水"> 包裝水</label>
        <label>是否煮沸？ <select name="work_boiled"><option value="">請選擇</option><option>是</option><option>否</option></select></label>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>飲食危險因子（潛伏期內）</h2>
    <div class="table-responsive">
      <table id="diet_table">
        <thead>
          <tr><th>日期</th><th>餐別</th><th>場所</th><th>風險食品名稱</th><th>備註</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <button type="button" class="btn no-print" onclick="addDietRow()">＋ 新增飲食紀錄</button>
  </section>

  <section class="card">
    <h2>旅行資料</h2>
    <h3 class="tag">【潛伏期】旅行史</h3>
    <table id="latent_travel_table">
      <thead><tr><th>日期起迄</th><th>縣市/國家</th><th>地點</th></tr></thead>
      <tbody></tbody>
    </table>
    <button type="button" class="btn no-print" onclick="addRow('latent_travel_table', ['date','text','text'])">＋ 新增紀錄</button>
    
    <h3 class="tag" style="margin-top:20px;">【可傳染期】旅行史</h3>
    <table id="infectious_travel_table">
      <thead><tr><th>日期起迄</th><th>縣市/國家</th><th>地點</th></tr></thead>
      <tbody></tbody>
    </table>
    <button type="button" class="btn no-print" onclick="addRow('infectious_travel_table', ['date','text','text'])">＋ 新增紀錄</button>
  </section>

  <section class="card no-print" style="text-align: center; background: #f0f9ff; border: 2px solid #0054a6;">
    <h2>疫調資料匯出</h2>
    <p class="muted">請確認資料正確後，選擇匯出格式：</p>
    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 15px;">
      <button class="btn" style="background: #e11d48;" onclick="exportToPDF()">🖨️ PDF 報表列印</button>
      <button class="btn" style="background: #2563eb;" onclick="exportToWord()">📝 匯出 Word 檔</button>
      <button class="btn secondary" onclick="submitJSON()">💾 備份 JSON 檔</button>
    </div>
  </section>
</main>

<script>
/* 核心計算邏輯 */
function calculateEpidemicPeriods() {
  const onsetValue = document.getElementById('primary_onset_date').value;
  if (!onsetValue) return;
  const onsetDate = new Date(onsetValue);
  const formatISO = (date) => date.toISOString().split('T')[0];

  const lStart = new Date(onsetDate); lStart.setDate(onsetDate.getDate() - 50);
  const lEnd = new Date(onsetDate);   lEnd.setDate(onsetDate.getDate() - 15);
  const iStart = new Date(onsetDate); iStart.setDate(onsetDate.getDate() - 14);
  const iEnd = new Date(onsetDate);   iEnd.setDate(onsetDate.getDate() + 7);

  document.getElementById('latent_range_display').innerText = `${lStart.toLocaleDateString('zh-TW')} ～ ${lEnd.toLocaleDateString('zh-TW')}`;
  document.getElementById('infectious_range_display').innerText = `${iStart.toLocaleDateString('zh-TW')} ～ ${iEnd.toLocaleDateString('zh-TW')}`;

  // 鎖定日期範圍
  const latentInputs = document.querySelectorAll('#diet_table input[type="date"], #latent_travel_table input[type="date"]');
  latentInputs.forEach(i => { i.min = formatISO(lStart); i.max = formatISO(lEnd); });
  const infectiousInputs = document.querySelectorAll('#infectious_travel_table input[type="date"]');
  infectiousInputs.forEach(i => { i.min = formatISO(iStart); i.max = formatISO(iEnd); });
}

/* 動態新增列 */
function addDietRow(){
  const tbody = document.querySelector('#diet_table tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="date"></td>
    <td><input type="text" placeholder="午餐"></td>
    <td><input type="text" placeholder="餐廳名稱"></td>
    <td><input type="text" placeholder="如：生魚片"></td>
    <td><input type="text"></td>`;
  tbody.appendChild(tr);
  calculateEpidemicPeriods();
}

function addRow(tableId, types){
  const tbody = document.querySelector('#'+tableId+' tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = types.map(t => `<td><input type="${t}"></td>`).join('');
  tbody.appendChild(tr);
  calculateEpidemicPeriods();
}

/* --- 匯出功能 --- */

// 1. PDF 列印
function exportToPDF() {
  if(!document.getElementById('primary_onset_date').value){
    alert('請先填寫發病日期'); return;
  }
  window.print();
}

// 2. Word 匯出
function exportToWord() {
  const onsetDate = document.getElementById('primary_onset_date').value || '未填寫';
  // 複製內容並移除按鈕
  const content = document.getElementById('capture-area').cloneNode(true);
  content.querySelectorAll('.no-print').forEach(el => el.remove());
  
  // 將 input 框的值轉為純文字 (Word 較易閱讀)
  content.querySelectorAll('input, select').forEach(el => {
    const span = document.createElement('span');
    span.innerText = el.value || '______';
    el.parentNode.replaceChild(span, el);
  });

  const htmlHeader = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>table{border-collapse:collapse;width:100%}th,td{border:1px solid #000;padding:5px}.card{margin-bottom:20px;border:1px solid #ccc;padding:10px}</style></head><body>`;
  const blob = new Blob(['\ufeff', htmlHeader + content.innerHTML + "</body></html>"], { type: 'application/msword' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `疫調報告_A肝_${onsetDate}.doc`;
  link.click();
}

// 3. JSON 匯出
function submitJSON() {
  const onsetDate = document.getElementById('primary_onset_date').value;
  const data = {
    onset_date: onsetDate,
    export_time: new Date().toLocaleString(),
    // ...可擴充 gatherData 收集邏輯
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `HAV_Data_${onsetDate}.json`;
  link.click();
}

window.onload = calculateEpidemicPeriods;
</script>

</body>
</html>
